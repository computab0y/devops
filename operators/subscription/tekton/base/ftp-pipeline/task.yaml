apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ftp-operation
  namespace: openshift-pipelines-operator
spec:
  params:
  - name: ftp-host
    type: string
    description: "The external FTP server host"
    default: "10.211.55.4"
  - name: ftp-port
    type: string
    description: "The external FTP server port"
    default: "21"
  - name: username
    type: string
    description: "The FTP username to connect as"
    default: "developer"
  - name: action
    type: string
    description: "Action to perform: sync-users, list-files, create-file, delete-file"
    default: "list-files"
    enum:
    - "sync-users"
    - "list-files"
    - "create-file"
    - "delete-file"
  - name: target-folder
    type: string
    description: "The folder to create or delete file in (SUBMISSION or NOTIFICATION)"
    default: "NOTIFICATION"
    enum:
    - "SUBMISSION"
    - "NOTIFICATION"
  - name: file-name
    type: string
    description: "The name of the file to create or delete"
    default: ""
  - name: vault-address
    type: string
    description: "The address of the Vault server"
    default: "http://vault.vault.svc:8200"
  - name: target-ou
    type: string
    description: "The target OU in Keycloak to list and sync users from"
    default: "FTP-Users"
  steps:
  - name: ftp-client
    image: python:3.11-slim
    securityContext:
      runAsUser: 0
    env:
    - name: VAULT_TOKEN
      valueFrom:
        secretKeyRef:
          name: vault-token
          key: token
    volumeMounts:
    - name: ssh-key-volume
      mountPath: /ssh
      readOnly: true
    script: |
      #!/usr/bin/env python3
      import os
      import sys
      import json
      import ssl
      import urllib.request
      import base64
      from ftplib import FTP
      from datetime import datetime
      from io import BytesIO

      FTP_HOST = "$(params.ftp-host)"
      FTP_PORT = int("$(params.ftp-port)")
      USERNAME = "$(params.username)"
      ACTION = "$(params.action)".lower()
      TARGET_FOLDER = "$(params.target-folder)"
      FILE_NAME = "$(params.file-name)"
      VAULT_ADDR = "$(params.vault-address)"
      TARGET_OU = "$(params.target-ou)"

      VAULT_TOKEN = os.environ.get("VAULT_TOKEN", "root")

      ctx = ssl.create_default_context()
      ctx.check_hostname = False
      ctx.verify_mode = ssl.CERT_NONE

      import subprocess

      def run_ssh_command(host, command):
          ssh_cmd = [
              "ssh",
              "-i", "/ssh/id_rsa",
              "-o", "StrictHostKeyChecking=no",
              "-o", "ConnectTimeout=10",
              f"root@{host}",
              command
          ]
          res = subprocess.run(ssh_cmd, capture_output=True, text=True)
          if res.returncode != 0:
              return False, res.stderr.strip()
          return True, res.stdout.strip()

      def create_vm_user(username, password, host):
          print(f"Ensuring user '{username}' exists on FTP host '{host}'...")
          setup_script = f"""
          if ! id -u "{username}" >/dev/null 2>&1; then
              echo "Creating user {username} on VM..."
              useradd -m -s /bin/bash "{username}"
          fi
          echo "{username}:{password}" | chpasswd
          mkdir -p "/home/{username}/SUBMISSION" "/home/{username}/NOTIFICATION"
          chown -R root:root "/home/{username}"
          chown -R "{username}:{username}" "/home/{username}/SUBMISSION" "/home/{username}/NOTIFICATION"
          chmod 755 "/home/{username}"
          """
          ok, err = run_ssh_command(host, setup_script)
          if not ok:
              print(f"Error provisioning user '{username}' on VM: {err}")
              return False
          print(f"User '{username}' provisioned/updated on FTP VM successfully.")
          return True

      # 1. Kubernetes client helpers using standard urllib
      def get_k8s_token():
          try:
              with open("/var/run/secrets/kubernetes.io/serviceaccount/token", "r") as f:
                  return f.read().strip()
          except Exception as e:
              print(f"Warning: Could not read k8s service account token: {e}")
              return None

      def make_k8s_request(path, method="GET", body=None):
          token = get_k8s_token()
          if not token:
              return None
          url = f"https://kubernetes.default.svc{path}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json" if method != "PATCH" else "application/merge-patch+json"
          }
          data = json.dumps(body).encode() if body else None
          req = urllib.request.Request(url, data=data, headers=headers, method=method)
          try:
              with urllib.request.urlopen(req, context=ctx) as response:
                  return json.loads(response.read().decode())
          except Exception as e:
              print(f"Kubernetes API request to {path} failed: {e}")
              return None

      # 2. Keycloak functions
      def get_keycloak_admin_creds():
          secret = make_k8s_request("/api/v1/namespaces/keycloak/secrets/keycloak-initial-admin")
          if not secret:
              print("Warning: keycloak-initial-admin secret not accessible. Using default fallback.")
              return "temp-admin", "c2da53c9e6b648d7bf1cf33830d0d2e5"
          
          data = secret.get("data", {})
          username = base64.b64decode(data.get("username", "")).decode().strip()
          password = base64.b64decode(data.get("password", "")).decode().strip()
          return username, password

      def get_keycloak_client():
          username, password = get_keycloak_admin_creds()
          urls = [
              "http://keycloak-service.keycloak.svc:8080",
              "https://keycloak-keycloak.apps.okd.local"
          ]
          for base_url in urls:
              token_url = f"{base_url}/realms/master/protocol/openid-connect/token"
              data = f"client_id=admin-cli&username={username}&password={password}&grant_type=password".encode()
              req = urllib.request.Request(token_url, data=data)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=5) as f:
                      token = json.loads(f.read().decode())["access_token"]
                      return base_url, token
              except Exception as e:
                  continue
          return None, None

      def get_keycloak_users_in_ou(target_ou):
          base_url, token = get_keycloak_client()
          if not token:
              print("Error: Could not authenticate to Keycloak.")
              return []
          
          users_url = f"{base_url}/admin/realms/rgb-realm/users"
          headers = {"Authorization": f"Bearer {token}"}
          req = urllib.request.Request(users_url, headers=headers)
          
          users_in_ou = []
          try:
              with urllib.request.urlopen(req, context=ctx) as f:
                  users = json.loads(f.read().decode())
                  for u in users:
                      user_id = u["id"]
                      user_detail_url = f"{base_url}/admin/realms/rgb-realm/users/{user_id}"
                      req_detail = urllib.request.Request(user_detail_url, headers=headers)
                      try:
                          with urllib.request.urlopen(req_detail, context=ctx) as fd:
                              ud = json.loads(fd.read().decode())
                              attrs = ud.get("attributes", {})
                              ou_list = attrs.get("OU", [])
                              if any(target_ou.lower() == ou.lower() for ou in ou_list):
                                  passwords = attrs.get("password", [])
                                  password = passwords[0] if passwords else None
                                  users_in_ou.append({
                                      "username": ud["username"],
                                      "password": password
                                  })
                      except Exception as ex:
                          print(f"Error fetching detail for user {user_id}: {ex}")
          except Exception as e:
              print(f"Error listing users from Keycloak: {e}")
          return users_in_ou

      # 3. Vault functions
      def get_vault_secret(path):
          url = f"{VAULT_ADDR}/v1/secret/data/{path}"
          req = urllib.request.Request(url, headers={"X-Vault-Token": VAULT_TOKEN})
          try:
              with urllib.request.urlopen(req) as response:
                  res = json.loads(response.read().decode('utf-8'))
                  return res.get("data", {}).get("data", {})
          except Exception as e:
              print(f"Vault secret {path} not found or error: {e}")
              return None

      def write_vault_secret(path, data):
          url = f"{VAULT_ADDR}/v1/secret/data/{path}"
          body = {"data": data}
          req = urllib.request.Request(
              url, 
              data=json.dumps(body).encode(), 
              headers={"X-Vault-Token": VAULT_TOKEN, "Content-Type": "application/json"},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as response:
                  print(f"Vault secret {path} updated successfully.")
                  return True
          except Exception as e:
              print(f"Error writing to Vault secret {path}: {e}")
              return False

      def update_vault_secrets(users):
          existing = get_vault_secret("ftp-users") or {}
          updated = False
          for u in users:
              username = u["username"]
              password = u["password"]
              if password and existing.get(username) != password:
                  existing[username] = password
                  updated = True
                  
          if updated:
              write_vault_secret("ftp-users", existing)

      def sync_user_to_vault(selected_username, users_in_ou):
          user_info = next((u for u in users_in_ou if u["username"] == selected_username), None)
          if not user_info:
              print(f"Warning: Selected user '{selected_username}' is not found in Keycloak OU '{TARGET_OU}'.")
              return False
              
          password = user_info["password"]
          if not password:
              print(f"Error: User '{selected_username}' exists in Keycloak but has no password attribute.")
              return False
              
          print(f"Syncing credentials for user '{selected_username}' from Keycloak to Vault...")
          
          # 1. Update ftp-users dict in Vault
          users_sec = get_vault_secret("ftp-users") or {}
          if users_sec.get(selected_username) != password:
              users_sec[selected_username] = password
              write_vault_secret("ftp-users", users_sec)
              
          # 2. Update ftp-credentials in Vault
          write_vault_secret("ftp-credentials", {"username": selected_username, "password": password})
          return True

      # 4. Pipeline Sync
      def sync_pipeline_params(users_in_ou):
          usernames = sorted(list(set([u["username"] for u in users_in_ou])))
          if not usernames:
              print("No users found in OU to sync pipeline params.")
              return

          print(f"Syncing pipeline params with usernames: {usernames}")
          username_enum = ["list"] + usernames

          for pipeline_name in ["ftp-sync-pipeline", "ftp-file-pipeline"]:
              pipeline_path = f"/apis/tekton.dev/v1/namespaces/openshift-pipelines-operator/pipelines/{pipeline_name}"
              pipeline = make_k8s_request(pipeline_path)
              if not pipeline:
                  print(f"Warning: Could not retrieve pipeline {pipeline_name}, skipping.")
                  continue

              spec_params = pipeline.get("spec", {}).get("params", [])
              updated_params = []
              for p in spec_params:
                  if p["name"] == "username":
                      p["enum"] = username_enum
                      if p.get("default") not in p["enum"]:
                          p["default"] = usernames[0]
                  updated_params.append(p)

              patch_body = {"spec": {"params": updated_params}}
              patched = make_k8s_request(pipeline_path, method="PATCH", body=patch_body)
              if patched:
                  print(f"Pipeline {pipeline_name} username dropdown updated.")
              else:
                  print(f"Failed to patch pipeline {pipeline_name}.")

      # Main execution flow
      if ACTION == "sync-users":
          print(f"Action: sync-users. Fetching users in OU '{TARGET_OU}' from Keycloak...")
          users = get_keycloak_users_in_ou(TARGET_OU)
          kc_usernames = [u["username"] for u in users]
          print(f"Users found in Keycloak OU '{TARGET_OU}': {kc_usernames}")

          synced = []
          skipped = []
          for u in users:
              if u["password"]:
                  synced.append(u["username"])
              else:
                  skipped.append(u["username"])

          if skipped:
              print(f"Warning: {len(skipped)} user(s) have no password attribute in Keycloak and will be skipped: {skipped}")

          update_vault_secrets(users)
          sync_pipeline_params(users)

          print(f"\n{'='*50}")
          print(f"  Sync complete: {len(synced)} user(s) saved to Vault")
          print(f"{'='*50}")
          vault_users = get_vault_secret("ftp-users") or {}
          if vault_users:
              print(f"\nAll users currently stored in Vault (secret/ftp-users):")
              for username in sorted(vault_users.keys()):
                  print(f"  - {username}")
          else:
              print("No users found in Vault after sync.")
          print(f"{'='*50}\n")
          sys.exit(0)

      if USERNAME.lower() != "list":
          print(f"Validating and syncing user '{USERNAME}' from Keycloak...")
          users = get_keycloak_users_in_ou(TARGET_OU)
          if not sync_user_to_vault(USERNAME, users):
              print(f"Error: User '{USERNAME}' does not exist in Keycloak OU '{TARGET_OU}'. Pipeline execution aborted.")
              sys.exit(1)
          try:
              sync_pipeline_params(users)
          except Exception as ex:
              print(f"Warning: Could not sync pipeline parameter dropdowns: {ex}")

      if USERNAME.lower() == "list":
          print("Fetching available FTP users from Vault...")
          users = []
          cred_sec = get_vault_secret("ftp-credentials")
          if cred_sec and "username" in cred_sec:
              users.append(cred_sec["username"])
          users_sec = get_vault_secret("ftp-users")
          if users_sec:
              users.extend(users_sec.keys())
          print("\nAvailable FTP users in Vault:")
          for u in sorted(list(set(users))):
              print(f"- {u}")
          sys.exit(0)

      print(f"Resolving credentials for user '{USERNAME}' from Vault...")
      resolved_user = None
      resolved_pass = None

      cred_sec = get_vault_secret("ftp-credentials")
      if cred_sec and cred_sec.get("username") == USERNAME:
          resolved_user = USERNAME
          resolved_pass = cred_sec.get("password")
      else:
          users_sec = get_vault_secret("ftp-users")
          if users_sec and USERNAME in users_sec:
              resolved_user = USERNAME
              resolved_pass = users_sec[USERNAME]

      if not resolved_user or not resolved_pass:
          print(f"Error: User '{USERNAME}' not found in Vault.")
          sys.exit(1)

      # SSH client is only needed from here — install it now if missing
      try:
          subprocess.run(["ssh", "-V"], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
      except Exception:
          print("Installing openssh-client...")
          try:
              subprocess.run(["apt-get", "update", "-o", "Acquire::Check-Valid-Until=false"], check=True, stdout=subprocess.DEVNULL)
              subprocess.run(["apt-get", "install", "-y", "openssh-client"], check=True, stdout=subprocess.DEVNULL)
              print("openssh-client installed.")
          except Exception as e:
              print(f"Warning: Could not install openssh-client: {e}")

      # Ensure user is provisioned on the FTP server VM
      create_vm_user(resolved_user, resolved_pass, FTP_HOST)

      print(f"Credentials resolved successfully. Connecting to FTP server {FTP_HOST}:{FTP_PORT} as user '{resolved_user}'...")

      try:
          ftp = FTP()
          ftp.trust_server_pasv_ipv4_address = True
          ftp.connect(FTP_HOST, FTP_PORT, timeout=30)
          ftp.login(resolved_user, resolved_pass)
          print("Login successful!")
      except Exception as e:
          print(f"Failed to connect/login to FTP server: {e}")
          sys.exit(1)

      print("Validating directory structure and isolation...")
      try:
          files = ftp.nlst()
          print(f"Root contents for {resolved_user}: {files}")
          
          unexpected = [f for f in files if f not in ["SUBMISSION", "NOTIFICATION", ".", ".."]]
          if unexpected:
              print(f"Warning: Found unexpected files/directories in FTP root: {unexpected}")
          
          for folder in ["SUBMISSION", "NOTIFICATION"]:
              if folder not in files:
                  print(f"Folder '{folder}' does not exist in root. Creating it...")
                  try:
                      ftp.mkd(folder)
                  except Exception as ex:
                      print(f"Could not create folder '{folder}': {ex}")
      except Exception as e:
          print(f"Error checking directory contents: {e}")

      def list_folders():
          for folder in ["SUBMISSION", "NOTIFICATION"]:
              print(f"\n--- Contents of folder: {folder} ---")
              try:
                  ftp.cwd('/')
                  ftp.cwd(folder)
                  
                  lines = []
                  ftp.retrlines('LIST', lines.append)
                  for line in lines:
                      print(line)
                  if not lines:
                      print("(empty folder)")
              except Exception as e:
                  print(f"Error listing folder '{folder}': {e}")

      if ACTION == "list-files":
          list_folders()

      elif ACTION == "create-file":
          if TARGET_FOLDER not in ["SUBMISSION", "NOTIFICATION", "BOTH"]:
              print(f"Error: Invalid target folder '{TARGET_FOLDER}'. Must be SUBMISSION, NOTIFICATION, or BOTH.")
              sys.exit(1)
              
          name = FILE_NAME
          if not name:
              name = f"test_{datetime.now().strftime('%Y%m%d_%H%M%S')}.txt"
              
          current_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          
          folders_to_update = ["SUBMISSION", "NOTIFICATION"] if TARGET_FOLDER == "BOTH" else [TARGET_FOLDER]
          for folder in folders_to_update:
              print(f"Creating file '{name}' in '{folder}' with content: '{current_time}'")
              try:
                  ftp.cwd('/')
                  ftp.cwd(folder)
                  file_data = BytesIO(current_time.encode('utf-8'))
                  ftp.storbinary(f"STOR {name}", file_data)
                  print(f"File uploaded successfully to '{folder}'!")
              except Exception as e:
                  print(f"Error creating file in '{folder}': {e}")
                  sys.exit(1)
          list_folders()

      elif ACTION == "delete-file":
          if not FILE_NAME:
              print("Error: file-name parameter is required for delete-file action.")
              sys.exit(1)
              
          if TARGET_FOLDER not in ["SUBMISSION", "NOTIFICATION", "BOTH"]:
              print(f"Error: Invalid target folder '{TARGET_FOLDER}'. Must be SUBMISSION, NOTIFICATION, or BOTH.")
              sys.exit(1)
              
          folders_to_update = ["SUBMISSION", "NOTIFICATION"] if TARGET_FOLDER == "BOTH" else [TARGET_FOLDER]
          for folder in folders_to_update:
              print(f"Deleting file '{FILE_NAME}' from '{folder}'...")
              try:
                  ftp.cwd('/')
                  ftp.cwd(folder)
                  ftp.delete(FILE_NAME)
                  print(f"File deleted successfully from '{folder}'!")
              except Exception as e:
                  print(f"Error deleting file from '{folder}': {e}")
                  sys.exit(1)
          list_folders()

      try:
          ftp.quit()
      except Exception:
          pass
      print("\nFinished FTP operations.")
  sidecars:
  - name: mock-ftp-server
    image: python:3.11-slim
    script: |
      #!/bin/sh
      if ! command -v python3 >/dev/null 2>&1; then
        echo "python3 not found, exiting gracefully for Tekton sidecar termination"
        exit 0
      fi
      python3 - << 'EOF'
      import socket
      import threading
      import sys
      import os

      class MockFTPServer:
          def __init__(self, host='127.0.0.1', port=2121):
              self.host = host
              self.port = port
              self.sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              self.sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              self.sock.bind((self.host, self.port))
              self.sock.listen(5)
              print(f"Mock FTP server listening on {self.host}:{self.port}")

          def run(self):
              try:
                  while True:
                      conn, addr = self.sock.accept()
                      threading.Thread(target=self.handle_client, args=(conn, addr), daemon=True).start()
              except KeyboardInterrupt:
                  pass
              finally:
                  self.sock.close()

          def handle_client(self, conn, addr):
              print(f"Connection from {addr}")
              conn.send(b"220 Mock FTP Server Ready\r\n")
              
              cwd = "/tmp/ftp-server"
              user_home = "/tmp/ftp-server"
              client_user = "anonymous"
              pasv_port = None
              pasv_sock = None
              
              while True:
                  try:
                      data = conn.recv(1024)
                      if not data:
                          break
                      line = data.decode('utf-8').strip()
                      print(f"Received: {line}")
                      parts = line.split(' ', 1)
                      cmd = parts[0].upper()
                      arg = parts[1] if len(parts) > 1 else ""
                      
                      if cmd == 'USER':
                          client_user = arg
                          conn.send(b"331 Username ok, send password.\r\n")
                      elif cmd == 'PASS':
                          # User directory isolation setup
                          user_home = os.path.abspath(f"/tmp/ftp-server/{client_user}")
                          os.makedirs(f"{user_home}/SUBMISSION", exist_ok=True)
                          os.makedirs(f"{user_home}/NOTIFICATION", exist_ok=True)
                          cwd = user_home
                          conn.send(b"230 Login successful.\r\n")
                      elif cmd == 'SYST':
                          conn.send(b"215 UNIX Type: L8\r\n")
                      elif cmd == 'FEAT':
                          conn.send(b"211-Features:\r\n211 End\r\n")
                      elif cmd == 'PWD':
                          rel_cwd = cwd.replace(user_home, "")
                          if not rel_cwd:
                              rel_cwd = "/"
                          conn.send(f'257 "{rel_cwd}" is current directory.\r\n'.encode())
                      elif cmd == 'TYPE':
                          conn.send(b"200 Type set to I.\r\n")
                      elif cmd == 'CWD':
                          if arg.startswith("/"):
                              target_dir = os.path.abspath(os.path.join(user_home, arg.lstrip("/")))
                          else:
                              target_dir = os.path.abspath(os.path.join(cwd, arg))
                          
                          if target_dir.startswith(user_home) and os.path.isdir(target_dir):
                              cwd = target_dir
                              conn.send(b"250 Directory successfully changed.\r\n")
                          else:
                              conn.send(b"550 Permission denied.\r\n")
                      elif cmd == 'MKD':
                          target_dir = os.path.abspath(os.path.join(cwd, arg))
                          if target_dir.startswith(user_home):
                              os.makedirs(target_dir, exist_ok=True)
                              conn.send(b"257 Directory created.\r\n")
                          else:
                              conn.send(b"550 Permission denied.\r\n")
                      elif cmd == 'PASV':
                          pasv_sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                          pasv_sock.bind(('127.0.0.1', 0))
                          pasv_sock.listen(1)
                          port = pasv_sock.getsockname()[1]
                          p1 = port // 256
                          p2 = port % 256
                          conn.send(f"227 Entering Passive Mode (127,0,0,1,{p1},{p2}).\r\n".encode())
                      elif cmd == 'LIST':
                          conn.send(b"150 File status okay; about to open data connection.\r\n")
                          if pasv_sock:
                              data_conn, data_addr = pasv_sock.accept()
                              files = os.listdir(cwd)
                              list_str = ""
                              for f in files:
                                  path = os.path.join(cwd, f)
                                  stat = os.stat(path)
                                  mode = "drwxr-xr-x" if os.path.isdir(path) else "-rw-r--r--"
                                  list_str += f"{mode} 1 owner group {stat.st_size} Jun 14 13:00 {f}\r\n"
                              data_conn.sendall(list_str.encode('utf-8'))
                              data_conn.close()
                              pasv_sock.close()
                              pasv_sock = None
                          conn.send(b"226 Closing data connection.\r\n")
                      elif cmd == 'STOR':
                          conn.send(b"150 File status okay; about to open data connection.\r\n")
                          if pasv_sock:
                              data_conn, data_addr = pasv_sock.accept()
                              file_path = os.path.abspath(os.path.join(cwd, arg))
                              if file_path.startswith(user_home):
                                  with open(file_path, 'wb') as f:
                                      while True:
                                          file_data = data_conn.recv(1024)
                                          if not file_data:
                                              break
                                          f.write(file_data)
                              data_conn.close()
                              pasv_sock.close()
                              pasv_sock = None
                          conn.send(b"226 Closing data connection.\r\n")
                      elif cmd == 'DELE':
                          file_path = os.path.abspath(os.path.join(cwd, arg))
                          if file_path.startswith(user_home) and os.path.isfile(file_path):
                              os.remove(file_path)
                              conn.send(b"250 File deleted.\r\n")
                          else:
                              conn.send(b"550 File not found or permission denied.\r\n")
                      elif cmd == 'QUIT':
                          conn.send(b"221 Goodbye.\r\n")
                          break
                      else:
                          conn.send(b"502 Command not implemented.\r\n")
                  except Exception as e:
                      print(f"Error handling client: {e}")
                      break
              conn.close()

      if __name__ == '__main__':
          MockFTPServer().run()
      EOF
  volumes:
  - name: ssh-key-volume
    secret:
      secretName: ftp-vm-ssh-key
      defaultMode: 0400
