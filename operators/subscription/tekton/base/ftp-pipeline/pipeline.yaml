apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ftp-sync-pipeline
  namespace: openshift-pipelines-operator
spec:
  params:
  - name: vault-address
    type: string
    description: "The address of the Vault server"
    default: "http://vault.vault.svc:8200"
  - name: target-ou
    type: string
    description: "The target OU in Keycloak to list and sync users from"
    default: "FTP-Users"
  tasks:
  - name: run-ftp-operation
    taskRef:
      name: ftp-operation
    params:
    - name: ftp-host
      value: "10.211.55.4"
    - name: ftp-port
      value: "21"
    - name: username
      value: "list"
    - name: action
      value: "sync-users"
    - name: vault-address
      value: $(params.vault-address)
    - name: target-ou
      value: $(params.target-ou)
