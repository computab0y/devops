apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ftp-sync-pipeline
  namespace: openshift-pipelines-operator
spec:
  params:
  - name: username
    type: string
    description: "FTP username (not required for sync-users — leave as 'list')"
    default: "list"
    enum:
    - "list"
    - "admin"
    - "developer"
    - "computab0y"
    - "testuser1"
  - name: action
    type: string
    description: "Action to perform: sync-users, list-files, create-file, delete-file"
    default: "sync-users"
    enum:
    - "sync-users"
    - "list-files"
    - "create-file"
    - "delete-file"
  - name: vault-address
    type: string
    description: "The address of the Vault server"
    default: "http://vault.vault.svc:8200"
  - name: target-ou
    type: string
    description: "The target OU in Keycloak to list and sync users from"
    default: "FTP-Users"
  tasks:
  - name: run-ftp-operation
    taskRef:
      name: ftp-operation
    params:
    - name: ftp-host
      value: "10.211.55.4"
    - name: ftp-port
      value: "21"
    - name: username
      value: $(params.username)
    - name: action
      value: $(params.action)
    - name: vault-address
      value: $(params.vault-address)
    - name: target-ou
      value: $(params.target-ou)
