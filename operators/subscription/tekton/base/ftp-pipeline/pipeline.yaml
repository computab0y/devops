apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ftp-sync-pipeline
  namespace: openshift-pipelines-operator
  annotations:
    style.tekton.dev/descriptors: |
      - path: params.username
        displayName: Username
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:select
        - urn:alm:descriptor:props:select:options:list
        - urn:alm:descriptor:props:select:options:admin
        - urn:alm:descriptor:props:select:options:developer
        - urn:alm:descriptor:props:select:options:computab0y
      - path: params.action
        displayName: Action
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:select
        - urn:alm:descriptor:props:select:options:sync-users
        - urn:alm:descriptor:props:select:options:list-files
        - urn:alm:descriptor:props:select:options:create-file
        - urn:alm:descriptor:props:select:options:delete-file
      - path: params.target-folder
        displayName: Target Folder
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:select
        - urn:alm:descriptor:props:select:options:SUBMISSION
        - urn:alm:descriptor:props:select:options:NOTIFICATION
spec:
  params:
  - name: ftp-host
    type: string
    description: "The external FTP server host"
    default: "10.211.55.4"
  - name: ftp-port
    type: string
    description: "The external FTP server port"
    default: "21"
  - name: username
    type: string
    description: "The FTP username to connect as"
    default: "developer"
  - name: action
    type: string
    description: "Action to perform: sync-users, list-files, create-file, delete-file"
    default: "list-files"
    enum:
    - "sync-users"
    - "list-files"
    - "create-file"
    - "delete-file"
  - name: target-folder
    type: string
    description: "The folder to create or delete file in (SUBMISSION or NOTIFICATION)"
    default: "NOTIFICATION"
    enum:
    - "SUBMISSION"
    - "NOTIFICATION"
  - name: file-name
    type: string
    description: "The name of the file to create or delete"
    default: ""
  - name: vault-address
    type: string
    description: "The address of the Vault server"
    default: "http://vault.vault.svc:8200"
  - name: target-ou
    type: string
    description: "The target OU in Keycloak to list and sync users from"
    default: "FTP-Users"
  tasks:
  - name: run-ftp-operation
    taskRef:
      name: ftp-operation
    params:
    - name: ftp-host
      value: $(params.ftp-host)
    - name: ftp-port
      value: $(params.ftp-port)
    - name: username
      value: $(params.username)
    - name: action
      value: $(params.action)
    - name: target-folder
      value: $(params.target-folder)
    - name: file-name
      value: $(params.file-name)
    - name: vault-address
      value: $(params.vault-address)
    - name: target-ou
      value: $(params.target-ou)
