apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ftp-sync-users-run-
  namespace: openshift-pipelines-operator
spec:
  pipelineRef:
    name: ftp-sync-pipeline
  params:
  - name: ftp-host
    value: "10.211.55.4"
  - name: ftp-port
    value: "21"
  - name: username
    value: "list"
  - name: action
    value: "sync-users"
  - name: target-folder
    value: "NOTIFICATION"
  - name: file-name
    value: ""
  - name: target-ou
    value: "FTP-Users"
