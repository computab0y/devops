apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ftp-sync-pipeline-run-
  namespace: openshift-pipelines-operator
spec:
  pipelineRef:
    name: ftp-file-pipeline
  params:
  - name: ftp-host
    value: "127.0.0.1"
  - name: ftp-port
    value: "2121"
  - name: username
    value: "testuser"
  - name: action
    value: "list-files"
  - name: target-folder
    value: "NOTIFICATION"
  - name: file-name
    value: "test-from-pipeline.txt"
