apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: pod-health-report
  namespace: openshift-pipelines-operator
spec:
  steps:
  - name: report-health
    image: quay.io/openshift/origin-cli:latest
    script: |
      #!/bin/bash
      TOTAL=$(oc get pods -A --no-headers | wc -l)
      UNHEALTHY=$(oc get pods -A --no-headers | grep -vE 'Running|Succeeded|Completed' | wc -l)
      HEALTHY=$((TOTAL - UNHEALTHY))
      
      echo "Pushing cluster-wide metrics..."
      echo -e "# HELP cluster_pods_healthy_count Number of healthy pods\n# TYPE cluster_pods_healthy_count gauge\ncluster_pods_healthy_count $HEALTHY\n# HELP cluster_pods_unhealthy_count Number of unhealthy pods\n# TYPE cluster_pods_unhealthy_count gauge\ncluster_pods_unhealthy_count $UNHEALTHY" | curl --data-binary @- http://pushgateway.grafana-operator.svc.cluster.local:9091/metrics/job/pod_health_check

      echo "Pushing per-namespace metrics..."
      for ns in $(oc get namespaces --no-headers -o custom-columns=":metadata.name"); do
        NS_TOTAL=$(oc get pods -n "$ns" --no-headers 2>/dev/null | wc -l)
        if [ "$NS_TOTAL" -gt 0 ]; then
          NS_UNHEALTHY=$(oc get pods -n "$ns" --no-headers 2>/dev/null | grep -vE 'Running|Succeeded|Completed' | wc -l)
          NS_HEALTHY=$((NS_TOTAL - NS_UNHEALTHY))
          echo -e "# HELP namespace_pods_healthy_count Number of healthy pods per namespace\n# TYPE namespace_pods_healthy_count gauge\nnamespace_pods_healthy_count $NS_HEALTHY\n# HELP namespace_pods_unhealthy_count Number of unhealthy pods per namespace\n# TYPE namespace_pods_unhealthy_count gauge\nnamespace_pods_unhealthy_count $NS_UNHEALTHY" | curl --data-binary @- http://pushgateway.grafana-operator.svc.cluster.local:9091/metrics/job/pod_health_check/namespace/"$ns"
        fi
      done
