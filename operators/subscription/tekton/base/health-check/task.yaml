apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: pod-health-report
  namespace: openshift-pipelines-operator
spec:
  steps:
  - name: report-health
    image: quay.io/openshift/origin-cli:latest
    script: |
      #!/bin/bash
      # Cluster-wide
      TOTAL=$(oc get pods -A --no-headers | wc -l)
      UNHEALTHY=$(oc get pods -A --no-headers | grep -vE 'Running|Succeeded|Completed' | wc -l)
      HEALTHY=$((TOTAL - UNHEALTHY))
      cat <<EOF | curl --data-binary @- http://pushgateway.grafana-operator.svc.cluster.local:9091/metrics/job/pod_health_check
      # HELP cluster_pods_healthy_count Number of healthy pods
      # TYPE cluster_pods_healthy_count gauge
      cluster_pods_healthy_count $HEALTHY
      # HELP cluster_pods_unhealthy_count Number of unhealthy pods
      # TYPE cluster_pods_unhealthy_count gauge
      cluster_pods_unhealthy_count $UNHEALTHY
EOF
      oc get namespaces --no-headers -o custom-columns=":metadata.name" | while read ns; do
        NS_TOTAL=$(oc get pods -n "$ns" --no-headers 2>/dev/null | wc -l)
        if [ "$NS_TOTAL" -gt 0 ]; then
          NS_UNHEALTHY=$(oc get pods -n "$ns" --no-headers 2>/dev/null | grep -vE 'Running|Succeeded|Completed' | wc -l)
          NS_HEALTHY=$((NS_TOTAL - NS_UNHEALTHY))
          cat <<EOF | curl --data-binary @- http://pushgateway.grafana-operator.svc.cluster.local:9091/metrics/job/pod_health_check/namespace/"$ns"
          # HELP namespace_pods_healthy_count Number of healthy pods per namespace
          # TYPE namespace_pods_healthy_count gauge
          namespace_pods_healthy_count $NS_HEALTHY
          # HELP namespace_pods_unhealthy_count Number of unhealthy pods per namespace
          # TYPE namespace_pods_unhealthy_count gauge
          namespace_pods_unhealthy_count $NS_UNHEALTHY
EOF
        fi
      done
