apiVersion: keycloak.org/v1alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  instances: 1
  externalAccess:
    enabled: true
  externalDatabase:
    enabled: true
    userSecret:
      name: keycloak-db-secret
      key: POSTGRES_USER
    passwordSecret:
      name: keycloak-db-secret
      key: POSTGRES_PASSWORD
    host: postgres
    database: keycloak
  keycloakDeploymentSpec:
    template:
      spec:
        containers:
          - name: keycloak
            env:
              - name: DB_VENDOR
                value: postgres
              - name: DB_ADDR
                value: postgres
              - name: DB_PORT
                value: "5432"
              - name: DB_DATABASE
                value: keycloak
              - name: DB_USER
                valueFrom:
                  secretKeyRef:
                    name: keycloak-db-secret
                    key: POSTGRES_USER
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: keycloak-db-secret
                    key: POSTGRES_PASSWORD
            readinessProbe:
              failureThreshold: 30
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
