apiVersion: keycloak.org/v1alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  instances: 1
  externalDatabase:
    enabled: true
  keycloakDeploymentSpec:
    template:
      spec:
        containers:
          - name: keycloak
            env:
              - name: DB_VENDOR
                value: postgres
              - name: DB_ADDR
                value: postgres
              - name: DB_DATABASE
                value: keycloak
              - name: DB_USER
                valueFrom:
                  secretKeyRef:
                    name: keycloak-db-secret
                    key: POSTGRES_USER
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: keycloak-db-secret
                    key: POSTGRES_PASSWORD
            readinessProbe:
              failureThreshold: 30
              initialDelaySeconds: 120
              periodSeconds: 20
              timeoutSeconds: 10
