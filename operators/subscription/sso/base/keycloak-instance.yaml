apiVersion: keycloak.org/v1alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  instances: 1
  keycloakDeploymentSpec:
    template:
      spec:
        containers:
          - name: keycloak
            livenessProbe:
              failureThreshold: 10
              initialDelaySeconds: 600
              periodSeconds: 30
              timeoutSeconds: 15
            readinessProbe:
              failureThreshold: 20
              initialDelaySeconds: 300
              periodSeconds: 30
              timeoutSeconds: 15
