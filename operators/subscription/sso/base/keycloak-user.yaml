apiVersion: keycloak.org/v1alpha1
kind: KeycloakUser
metadata:
  name: rgb-admin-user
  labels:
    app: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  realmSelector:
    matchLabels:
      app: keycloak
  user:
    username: rgb-admin
    enabled: true
    email: admin@rgb.com
    firstName: RGB
    lastName: Admin
    credentials:
      - type: password
        value: password123
    realmRoles:
      - admin
