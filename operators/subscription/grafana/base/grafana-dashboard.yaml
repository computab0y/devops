apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cluster-health
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Comprehensive Cluster Health",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(namespace_pods_healthy_count, namespace)",
            "includeAll": true,
            "multi": false,
            "allValue": ".*",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "title": "Pod Health History ($namespace)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "sum(namespace_pods_healthy_count{namespace=~"$namespace"}) or cluster_pods_healthy_count", "legendFormat": "Healthy Pods" },
            { "expr": "sum(namespace_pods_unhealthy_count{namespace=~"$namespace"}) or cluster_pods_unhealthy_count", "legendFormat": "Unhealthy Pods" }
          ],
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Healthy Pods" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Unhealthy Pods" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          }
        }
      ]
    }
