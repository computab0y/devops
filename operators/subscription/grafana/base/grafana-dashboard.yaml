apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cluster-health
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Cluster Health",
      "panels": [
        {
          "title": "Ready Nodes",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_node_status_condition{condition='Ready',status='true'})" }]
        },
        {
          "title": "Daily Health Check: Healthy Pods",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "cluster_pods_healthy_count" }],
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "Daily Health Check: Unhealthy Pods",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "cluster_pods_unhealthy_count" }],
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "CPU Allocation %",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='cpu'}) / sum(kube_node_status_allocatable{resource='cpu'}) * 100" }]
        },
        {
          "title": "Memory Allocation %",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='memory'}) / sum(kube_node_status_allocatable{resource='memory'}) * 100" }]
        },
        {
          "title": "Unhealthy Pods by Namespace",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum by (namespace) (kube_pod_status_phase{phase!~'Running|Succeeded|Completed'}) > 0" }]
        }
      ]
    }
