apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cluster-health
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Comprehensive Cluster Health & Inventory",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(kube_pod_info, namespace)",
            "includeAll": true,
            "multi": false,
            "allValue": ".*",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "title": "Argo CD Application Health",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "count(argocd_app_info{health_status='Healthy', dest_namespace=~'$namespace'})", "legendFormat": "Healthy Apps" },
            { "expr": "count(argocd_app_info{health_status!='Healthy', dest_namespace=~'$namespace'})", "legendFormat": "Unhealthy Apps" }
          ],
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Healthy Apps" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Unhealthy Apps" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          }
        },
        {
          "title": "Certificate Expiry (OCP internal)",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "(ocp_cert_expiry_at - time()) / 86400" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds", "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 30 }] } } },
              "unit": "decdays"
            }
          }
        },
        {
          "title": "CPU Requested %",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 6 },
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='cpu', namespace=~'$namespace'}) / sum(kube_node_status_allocatable{resource='cpu'}) * 100" }]
        },
        {
          "title": "Memory Requested %",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 6 },
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='memory', namespace=~'$namespace'}) / sum(kube_node_status_allocatable{resource='memory'}) * 100" }]
        }
      ]
    }
