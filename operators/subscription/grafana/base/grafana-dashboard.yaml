apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cluster-health
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Cluster Health",
      "panels": [
        {
          "title": "Ready Nodes",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_node_status_condition{condition='Ready',status='true'})" }]
        },
        {
          "title": "CPU Allocation %",
          "type": "gauge",
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='cpu'}) / sum(kube_node_status_allocatable{resource='cpu'}) * 100" }]
        },
        {
          "title": "Memory Allocation %",
          "type": "gauge",
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='memory'}) / sum(kube_node_status_allocatable{resource='memory'}) * 100" }]
        }
      ]
    }
