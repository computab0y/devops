apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cluster-health
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "title": "Cluster Health, Apps & Certificates",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(kube_pod_info, namespace)",
            "includeAll": true,
            "multi": false,
            "allValue": ".*",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "title": "Argo CD Application Health",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "count(argocd_app_info{health_status='Healthy'})", "legendFormat": "Healthy Apps" },
            { "expr": "count(argocd_app_info{health_status!='Healthy'})", "legendFormat": "Unhealthy Apps" }
          ],
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Healthy Apps" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Unhealthy Apps" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          }
        },
        {
          "title": "Certificate Expiry Alerts (Expiring within 30 days)",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "(ocp_cert_expiry_at - time()) / 86400 < 30" }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0 }]
              },
              "unit": "decdays"
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "displayName", "value": "Days to Expiry" }] }
            ]
          }
        },
        {
          "title": "CPU Requested %",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 6 },
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='cpu', namespace=~'$namespace'}) / sum(kube_node_status_allocatable{resource='cpu'}) * 100" }]
        },
        {
          "title": "Memory Requested %",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 6 },
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(kube_pod_container_resource_requests{resource='memory', namespace=~'$namespace'}) / sum(kube_node_status_allocatable{resource='memory'}) * 100" }]
        },
        {
          "title": "Pod Health History",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "sum(namespace_pods_healthy_count{namespace=~\"$namespace\"}) or cluster_pods_healthy_count", "legendFormat": "Healthy Pods" },
            { "expr": "sum(namespace_pods_unhealthy_count{namespace=~\"$namespace\"}) or cluster_pods_unhealthy_count", "legendFormat": "Unhealthy Pods" }
          ]
        }
      ]
    }
