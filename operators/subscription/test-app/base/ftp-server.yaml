apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-ftp-server-script
  namespace: test-app
data:
  mock_ftp.py: |
    import socket
    import threading
    import os
    import sys

    # Serve from /tmp/ftp-server
    os.makedirs("/tmp/ftp-server/SUBMISSION", exist_ok=True)
    os.makedirs("/tmp/ftp-server/NOTIFICATION", exist_ok=True)

    # Write a dummy submission file so the listing is not empty
    with open("/tmp/ftp-server/SUBMISSION/sample_submission.xml", "w") as f:
        f.write("<submission>sample data from standalone server</submission>")

    POD_IP = os.environ.get("POD_IP", "127.0.0.1")
    h1, h2, h3, h4 = POD_IP.split('.')

    class MockFTPServer:
        def __init__(self, host='0.0.0.0', port=2121):
            self.host = host
            self.port = port
            self.sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            self.sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
            self.sock.bind((self.host, self.port))
            self.sock.listen(5)
            print(f"Mock FTP server running on {self.host}:{self.port} with Pod IP {POD_IP}")

        def run(self):
            try:
                while True:
                    conn, addr = self.sock.accept()
                    threading.Thread(target=self.handle_client, args=(conn, addr), daemon=True).start()
            except KeyboardInterrupt:
                pass
            finally:
                self.sock.close()

        def handle_client(self, conn, addr):
            print(f"Connection from {addr}")
            conn.send(b"220 Mock FTP Server Ready\r\n")
            
            cwd = "/tmp/ftp-server"
            pasv_port = None
            pasv_sock = None
            
            while True:
                try:
                    data = conn.recv(1024)
                    if not data:
                        break
                    line = data.decode('utf-8').strip()
                    print(f"Received: {line}")
                    parts = line.split(' ', 1)
                    cmd = parts[0].upper()
                    arg = parts[1] if len(parts) > 1 else ""
                    
                    if cmd == 'USER':
                        conn.send(b"331 Username ok, send password.\r\n")
                    elif cmd == 'PASS':
                        conn.send(b"230 Login successful.\r\n")
                    elif cmd == 'SYST':
                        conn.send(b"215 UNIX Type: L8\r\n")
                    elif cmd == 'FEAT':
                        conn.send(b"211-Features:\r\n211 End\r\n")
                    elif cmd == 'PWD':
                        rel_cwd = cwd.replace("/tmp/ftp-server", "")
                        if not rel_cwd:
                            rel_cwd = "/"
                        conn.send(f'257 "{rel_cwd}" is current directory.\r\n'.encode())
                    elif cmd == 'TYPE':
                        conn.send(b"200 Type set to I.\r\n")
                    elif cmd == 'CWD':
                        if arg.startswith("/"):
                            target_dir = os.path.abspath(os.path.join("/tmp/ftp-server", arg.lstrip("/")))
                        else:
                            target_dir = os.path.abspath(os.path.join(cwd, arg))
                        
                        if target_dir.startswith("/tmp/ftp-server") and os.path.isdir(target_dir):
                              cwd = target_dir
                              conn.send(b"250 Directory successfully changed.\r\n")
                        else:
                              os.makedirs(target_dir, exist_ok=True)
                              cwd = target_dir
                              conn.send(b"250 Directory successfully changed.\r\n")
                    elif cmd == 'MKD':
                        target_dir = os.path.abspath(os.path.join(cwd, arg))
                        os.makedirs(target_dir, exist_ok=True)
                        conn.send(b"257 Directory created.\r\n")
                    elif cmd == 'PASV':
                        pasv_sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                        pasv_sock.bind(('0.0.0.0', 0))
                        pasv_sock.listen(1)
                        port = pasv_sock.getsockname()[1]
                        p1 = port // 256
                        p2 = port % 256
                        conn.send(f"227 Entering Passive Mode ({h1},{h2},{h3},{h4},{p1},{p2}).\r\n".encode())
                    elif cmd == 'LIST':
                        conn.send(b"150 File status okay; about to open data connection.\r\n")
                        if pasv_sock:
                            data_conn, data_addr = pasv_sock.accept()
                            files = os.listdir(cwd)
                            list_str = ""
                            for f in files:
                                path = os.path.join(cwd, f)
                                stat = os.stat(path)
                                mode = "drwxr-xr-x" if os.path.isdir(path) else "-rw-r--r--"
                                list_str += f"{mode} 1 owner group {stat.st_size} Jun 14 13:00 {f}\r\n"
                            data_conn.sendall(list_str.encode('utf-8'))
                            data_conn.close()
                            pasv_sock.close()
                            pasv_sock = None
                        conn.send(b"226 Closing data connection.\r\n")
                    elif cmd == 'STOR':
                        conn.send(b"150 File status okay; about to open data connection.\r\n")
                        if pasv_sock:
                            data_conn, data_addr = pasv_sock.accept()
                            file_path = os.path.join(cwd, arg)
                            with open(file_path, 'wb') as f:
                                while True:
                                    file_data = data_conn.recv(1024)
                                    if not file_data:
                                        break
                                    f.write(file_data)
                            data_conn.close()
                            pasv_sock.close()
                            pasv_sock = None
                        conn.send(b"226 Closing data connection.\r\n")
                    elif cmd == 'DELE':
                        file_path = os.path.abspath(os.path.join(cwd, arg))
                        if file_path.startswith("/tmp/ftp-server") and os.path.isfile(file_path):
                            os.remove(file_path)
                            conn.send(b"250 File deleted.\r\n")
                        else:
                            conn.send(b"550 File not found or permission denied.\r\n")
                    elif cmd == 'NLST':
                        conn.send(b"150 File status okay; about to open data connection.\r\n")
                        if pasv_sock:
                            data_conn, data_addr = pasv_sock.accept()
                            files = os.listdir(cwd)
                            data_conn.sendall('\r\n'.join(files).encode('utf-8'))
                            data_conn.close()
                            pasv_sock.close()
                            pasv_sock = None
                        conn.send(b"226 Closing data connection.\r\n")
                    elif cmd == 'QUIT':
                        conn.send(b"221 Goodbye.\r\n")
                        break
                    else:
                        conn.send(b"502 Command not implemented.\r\n")
                except Exception as e:
                    print(f"Error handling client: {e}")
                    break
            conn.close()

    if __name__ == '__main__':
        MockFTPServer().run()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-ftp-server
  namespace: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-ftp-server
  template:
    metadata:
      labels:
        app: mock-ftp-server
    spec:
      containers:
      - name: ftp-server
        image: python:3.11-slim
        command: ["python3", "/app/mock_ftp.py"]
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 2121
          name: ftp-control
        volumeMounts:
        - name: script-vol
          mountPath: /app
      volumes:
      - name: script-vol
        configMap:
          name: mock-ftp-server-script
---
apiVersion: v1
kind: Service
metadata:
  name: mock-ftp-service
  namespace: test-app
spec:
  selector:
    app: mock-ftp-server
  ports:
  - name: ftp-control
    port: 2121
    targetPort: 2121
  type: ClusterIP
