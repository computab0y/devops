server {
    listen 8080;
    default_type application/json;

    location = /endpoints {
        alias /data/endpoints.json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control no-cache;
    }

    location = /unitEndpoints {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control no-cache;
        if ($request_method = 'POST') {
            return 201 '{"status":"created","message":"Unit endpoint linked successfully"}';
        }
        alias /data/unit-endpoints.json;
    }

    location ~ ^/unitEndpoints/(.+)$ {
        add_header Access-Control-Allow-Origin "*" always;
        if ($request_method = 'DELETE') { return 204; }
        if ($request_method = 'PATCH')  { return 200 '{"status":"updated"}'; }
        return 405 '{"error":"method not allowed"}';
    }

    location / {
        return 200 '{"message":"mock api"}';
        add_header Content-Type application/json;
    }
}
