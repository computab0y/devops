server {
    listen 8080;
    default_type application/json;

    root /usr/share/nginx/html;
    index index.html;

    # GET /endpoints — serve TA_Endpoint data from httpbin mock-api
    location = /endpoints {
        proxy_pass http://httpbin:8080/endpoints;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
    }

    # POST /unitEndpoints — accept link requests, return 201
    location = /unitEndpoints {
        if ($request_method = 'POST') {
            return 201 '{"status":"created","message":"Unit endpoint linked successfully"}';
        }
        if ($request_method = 'GET') {
            return 200 '[]';
        }
        return 405 '{"error":"method not allowed"}';
    }

    # DELETE/PATCH /unitEndpoints/{id}
    location ~ ^/unitEndpoints/(.+)$ {
        if ($request_method = 'DELETE') {
            return 204;
        }
        if ($request_method = 'PATCH') {
            return 200 '{"status":"updated"}';
        }
        return 405 '{"error":"method not allowed"}';
    }

    # Static files for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
}
