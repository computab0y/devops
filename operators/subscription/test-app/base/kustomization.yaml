resources:
- namespace.yaml
- httpbin.yaml
- swagger-ui.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: swagger-nginx-conf
  namespace: test-app
  files:
  - swagger-nginx.conf=static/swagger-nginx.conf
- name: swagger-index
  namespace: test-app
  files:
  - static/index.html
- name: swagger-theme
  namespace: test-app
  files:
  - static/theme-feeling-blue.css
- name: swagger-style
  namespace: test-app
  files:
  - static/style.css
- name: swagger-spec
  namespace: test-app
  files:
  - static/openapi.yaml

- name: mock-api-data
  namespace: test-app
  files:
  - endpoints.json=static/endpoints.json
  - unit-endpoints.json=static/unit-endpoints.json
- name: mock-api-app
  namespace: test-app
  files:
  - api-server.py=static/api-server.py

secretGenerator:
- name: swagger-logo
  namespace: test-app
  files:
  - static/logo.png
