apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
      - name: mock-api
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: data
          mountPath: /data
      volumes:
      - name: nginx-conf
        configMap:
          name: mock-api-nginx-conf
      - name: data
        configMap:
          name: mock-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: test-app
spec:
  selector:
    app: httpbin
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: httpbin
  namespace: test-app
spec:
  to:
    kind: Service
    name: httpbin
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
