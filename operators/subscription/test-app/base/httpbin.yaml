apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
      - name: api-server
        image: python:3.11-alpine
        command: ["python", "/app/api-server.py"]
        ports:
        - containerPort: 8080
        env:
        - name: DATA_DIR
          value: /data
        - name: PORT
          value: "8080"
        volumeMounts:
        - name: app
          mountPath: /app
        - name: data
          mountPath: /data
      volumes:
      - name: app
        configMap:
          name: mock-api-app
      - name: data
        configMap:
          name: mock-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: test-app
spec:
  selector:
    app: httpbin
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: httpbin
  namespace: test-app
spec:
  to:
    kind: Service
    name: httpbin
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
