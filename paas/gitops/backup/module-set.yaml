apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: backup
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
      - app: etcd
        url: https://kubernetes.default.svc 
  template:
    metadata:
      name: backup-{{app}}
      namespace: openshift-gitops
    spec:
      destination:
        server: https://kubernetes.default.svc
      project: default
      source:
        path: gitops/backup/{{app}}
        repoURL: https://bitbucket.uk.ngridtools.com/scm/efe/devops-cluster-config.git
        targetRevision: master
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
      ignoreDifferences:
      - group: "*"
        kind: ServiceAccount
        name: openshift-backup
        namespace: ocp-etcd-backup
        jsonPointers:
        - /secrets
        - /imagePullSecrets     
