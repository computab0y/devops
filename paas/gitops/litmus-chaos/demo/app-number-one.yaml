---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-number-one
  namespace: demo-app
spec:
  selector:
    matchLabels:
      app: httpd-one
  replicas: 1
  template:
    metadata:
      labels:
        app: httpd-one
        litmuschaos.io/chaos: 'true'
    spec:
      containers:
        - name: httpd-one
          image: >-
            image-registry.openshift-image-registry.svc:5000/openshift/httpd:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app-number-one
  namespace: demo-app
spec:
  selector:
    app: httpd-one
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: app-number-one
  namespace: demo-app
spec:
  path: /
  to:
    kind: Service
    name: app-number-one
  port:
    targetPort: 8080