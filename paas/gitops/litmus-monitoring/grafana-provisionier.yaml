apiVersion: v1
kind: ConfigMap
metadata:
  name: litmus-grafana-provisioner
  namespace: litmus-monitoring
data:
  default.yaml: |-
    {
        "apiVersion": 1,
        "providers": [
            {
                "name": "Prometheus",
                "orgId": 1,
                "folder": "Default",
                "type": "file",
                "disableDeletion": true,
                "editable": true,
                "options": {
                    "path": "/var/lib/grafana/dashboards"
                }
            }
        ]
    }