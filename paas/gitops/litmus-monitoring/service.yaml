apiVersion: v1
kind: Service
metadata:
  annotations:
  name: grafana
  namespace: litmus-monitoring
spec:
  ports:
    - name: tcp
      port: 3000
      protocol: TCP
      targetPort: 3000
  selector:
    app: grafana
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: litmus-monitoring
spec:
  port:
    targetPort: tcp
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: grafana
    weight: 100
  wildcardPolicy: None