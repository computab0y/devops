apiVersion: postgresql.k8s.enterprisedb.io/v1
kind: Cluster
metadata:
  name: edb-postgresql-dev-pr
  namespace: edb-postgresql-dev-pr
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    categories: database
  labels:
    environment: dev-pr
    workload: database
spec:
  imageName: quay.io/enterprisedb/postgresql:14.4
  description: "Dev-PR EDB Cluster"
  instances: 1
  startDelay: 300
  stopDelay: 300
  primaryUpdateStrategy: unsupervised
  logLevel: info
  monitoring:
    enablePodMonitor: true

  postgresql:
    parameters:
      shared_buffers: 256MB
      pg_stat_statements.max: '10000'
      pg_stat_statements.track: all
      auto_explain.log_min_duration: '10s'
    pg_hba:
      - host all all 10.128.0.0/14 md5

  bootstrap:
    initdb:
      database: dev-a-pr
      owner: dev-a-pr-admin
      secret:
        name: edb-postgres-dev-a-pr-db-owner
        
  storage:          
    size: 100Gi      
    storageClass: ocs-storagecluster-ceph-rbd


  # backup:                 
  #   barmanObjectStore:
  #     destinationPath: s3://cluster-example-full-backup/
  #     endpointURL: http://custom-endpoint:1234
  #     s3Credentials:
  #       accessKeyId:
  #         name: backup-creds
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: backup-creds
  #         key: ACCESS_SECRET_KEY
  resources:
    requests:
      memory: "4Gi"
      cpu: "2"
    limits:
      memory: "6Gi"
      cpu: "4"