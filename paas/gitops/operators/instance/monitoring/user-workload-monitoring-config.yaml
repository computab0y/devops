apiVersion: v1
kind: ConfigMap
metadata:
  name: user-workload-monitoring-config
  namespace: openshift-user-workload-monitoring
data:
  config.yaml: |
    prometheus:
      retention: 15d
      enforcedSampleLimit: 50000
      resources:       
        limits:
          cpu: 2
          memory: 4Gi
        requests:
          cpu: 2
          memory: 2Gi      
      volumeClaimTemplate:
        spec:
          storageClassName: ocs-storagecluster-ceph-rbd
          resources:
            requests:
              storage: 10Gi
    thanosRuler:
      retention: 7d
      resources:       
        limits:
          cpu: 2
          memory: 4Gi
        requests:
          cpu: 2
          memory: 2Gi          
      volumeClaimTemplate:
        spec:
          storageClassName: ocs-storagecluster-ceph-rbd
          resources:
            requests:
              storage: 10Gi