apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-stuck
  namespace: openshift-monitoring
spec:
  groups:
  - name: PodStuck
    rules:
    - alert: PodStuckContainerCreating
      annotations:
        summary: Pod stuck at ContainerCreating in project {{ $labels.namespace }}
        message: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at ContainerCreating
        description: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at ContainerCreating
      expr: kube_pod_container_status_waiting_reason{reason="ContainerCreating"}  == 1
      for: 3m
      labels:
        severity: critical
        receiver: 'line'
    - alert: PodStuckImagePullBackOff
      annotations:
        summary: Cannot pull images in project {{ $labels.namespace }}
        message: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at ImagePullBackOff
        description: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at ImagePullBackOff
      expr: kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} == 1
      for: 2m
      labels:
        severity: critical
        receiver: 'line'
    - alert: PodStuckCrashLoopBackOff
      annotations:
        summary: CrashLoopBackOff in project {{ $labels.namespace }}
        message: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at CrashLoopBackOff
        description: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at CrashLoopBackOff
      expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1 
      for: 2m
      labels:
        severity: critical
        receiver: 'line'
    - alert: PodStuckCreateContainerError
      annotations:
        summary: Pod cannot created in project {{ $labels.namespace }}
        message: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at CreateContainerError
        description: Pod  {{ $labels.pod }}  in project {{ $labels.namespace }} project stuck at CreateContainerError
      expr: kube_pod_container_status_waiting_reason{reason="CreateContainerError"} == 1 
      for: 2m
      labels:
        severity: critical
        receiver: 'line'
    - alert: FailedEvictedPods
      annotations:
        summary: Failed Evicted pod:{{ $labels.pod }} namespace:{{ $labels.namespace }}
        message: Failed Evicted pod:{{ $labels.pod }} namespace:{{ $labels.namespace }}
        description: Failed Evicted pod:{{ $labels.pod }} namespace:{{ $labels.namespace }}
      expr: sum by(namespace, pod) (kube_pod_status_phase{phase="Failed"} > 0 and on(namespace, pod) kube_pod_status_reason{reason="Evicted"} > 0) > 0   
      for: 3m 
      labels:
        severity: critical
        receiver: 'line'
    - alert: OOMKilled
      annotations:
        summary: Container {{ $labels.container }} of pod {{ $labels.pod }} in project {{ $labels.namespace }} is out of memory
        message: Container {{ $labels.container }} of pod {{ $labels.pod }} in project {{ $labels.namespace }} is out of memory
        description: Container {{ $labels.container }} of pod {{ $labels.pod }} in project {{ $labels.namespace }} is out of memory
      expr:  kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}==1   
      for: 1m 
      labels:
        severity: critical
        receiver: 'line'
    - alert: PodCPULoadIntermittent
      annotations:
        summary: Pod {{ $labels.pod }} in {{ $labels.namespace }} is experiencing intermittent CPU load
        description: Pod {{ $labels.pod }} in {{ $labels.namespace }} is experiencing intermittent CPU load
      expr: rate(container_cpu_usage_seconds_total{container!="POD", namespace!="", pod!=""}[5m]) > 2
      for: 1m
      labels:
        severity: critical
        receiver: 'line'
    - alert: PodCPULoadHigh
      annotations:
        summary: High CPU usage detected in Pod {{ $labels.pod }} in  {{ $labels.namespace }}
        description: High CPU usage detected in Pod {{ $labels.pod }} {{ $labels.namespace }}. CPU usage is above 80% of allocated quota.
      expr: 100 * (1 - avg by (namespace, pod) (irate(container_cpu_usage_seconds_total{container!="POD", namespace!="", pod!=""}[5m]))) / (sum by (namespace, pod) (container_spec_cpu_quota{namespace!="", pod!=""}) / 100000) > 80
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: CoreDNSHighDNSFailures
      annotations:
        summary: High DNS failure rate detected in CoreDNS ({{ $labels.namespace }})
        description: High DNS failure rate detected in CoreDNS for {{ $labels.namespace }}. Check for potential DNS issues.
      expr: (sum by(namespace) (rate(coredns_dns_responses_total{rcode="SERVFAIL"}[5m])) / sum by(namespace) (rate(coredns_dns_responses_total[5m]))) > 0.01
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: PotentialDNSIssue
      annotations:
        summary: Potential DNS issue detected, High rate of NXDOMAIN responses
        description: Potential DNS issue detected, High rate of NXDOMAIN responses. Investigate potential DNS spoofing or misconfiguration.
      expr: rate(coredns_dns_responses_total{rcode="NXDOMAIN"}[5m]) > 10
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: HighIOStress
      annotations:
        summary: High I/O stress detected in Pod {{ $labels.pod }} in {{ $labels.namespace }}
        description: High I/O stress detected in Pod {{ $labels.pod }} in {{ $labels.namespace }}. Check for potential disk I/O issues.
      expr: sum(rate(container_fs_io_time_seconds_total[5m])) by (namespace, pod, container) > 0.1
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: HighMemoryUsage
      annotations:
        summary: High memory usage detected in Pod {{ $labels.pod }} in {{ $labels.namespace }})
        description: High memory usage detected in Pod {{ $labels.pod }} in {{ $labels.namespace }}. Memory usage is above 90% of allocated limits.
      expr: sum(container_memory_usage_bytes{container!="POD"}) by (namespace, pod) / sum(container_spec_memory_limit_bytes{container!="POD"}) by (namespace, pod) > 0.9
      for: 5m
      labels:
        severity: warning
        receiver: 'line'
    - alert: MemoryHogExec
      annotations:
        summary: Memory hog detected in Pod {{ $labels.pod }} in {{ $labels.namespace }})
        description: Memory hog detected in Pod {{ $labels.pod }} in {{ $labels.namespace }}. Rate of memory increase is above 1 GB per 5 minutes.
      expr: rate(container_memory_working_set_bytes{container!="POD"}[5m]) > 1e9
      for: 5m
      labels:
        severity: warning
        receiver: 'line'
    - alert: MemoryHog
      annotations:
        summary: Memory hog detected in Pod {{ $labels.pod }} in {{ $labels.namespace }}
        description: Memory hog detected in Pod {{ $labels.pod }} in {{ $labels.namespace }}. Memory usage is more than twice the average.
      expr: (sum(container_memory_working_set_bytes{container!="POD"}) by (namespace, pod) / sum(container_memory_working_set_bytes) by (namespace, pod)) > 2
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: PodCrashLoopBackOff
      annotations:
        summary: Pod in CrashLoopBackOff detected {{ $labels.pod }} in {{ $labels.namespace }}
        description: Pod {{ $labels.pod }} in {{ $labels.namespace }} is in CrashLoopBackOff state. Investigate and address the issue.
      expr: max(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}) by (namespace, pod) > 0
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: ContainerCrash
      annotations:
        summary: Container crash detected {{ $labels.container }} in Pod {{ $labels.pod }} in {{ $labels.namespace }}
        description: Container {{ $labels.container }} in Pod {{ $labels.pod }} in {{ $labels.namespace }}) has crashed with an error.
      expr: max(kube_pod_container_status_last_terminated_reason{reason="error"}) by (namespace, pod, container) > 0
      for: 5m
      labels:
        severity: critical
        receiver: 'line'
    - alert: KubePodReadinessFailure 
      annotations: 
        description: Readiness probe for the Pod {{ $labels.pod }} is failing for last 10 minutes 
      expr: sum by(pod)( kube_pod_info{created_by_kind!="Job"} AND ON (pod, namespace) kube_pod_status_ready{condition="false"} == 1) > 0 
      for: 10m 
      labels: 
        severity: critical
        receiver: 'line'