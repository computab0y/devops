apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-project-app
  namespace: sample-project-app
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    matchLabels:
      app: sample-project-app
  replicas: 1
  template:
    metadata:
      labels:
        app: sample-project-app
    spec:
      containers:
        - name: sample-project-app
          image: >-
            image-registry.openshift-image-registry.svc:5000/openshift/httpd:latest
          ports:
            - containerPort: 8080
