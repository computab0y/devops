apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: styra-opa
  namespace: openshift-gitops
spec:
  destination:
    namespace: styra-system
    server: 'https://kubernetes.default.svc'
  source:
    path: styra-k8s-system-0.9.0
    repoURL: 'https://bitbucket.uk.ngridtools.com/scm/efe/styra-opa.git'
    targetRevision: master
    helm:
      valueFiles:
        - values_devops.yaml
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true