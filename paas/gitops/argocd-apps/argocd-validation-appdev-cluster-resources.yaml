apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-appdev-cluster-resources
  namespace: openshift-gitops
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: default
  source:
    path: common-tekton-artifacts
    repoURL: https://bitbucket.uk.ngridtools.com/scm/efe/appdev-cluster-config.git
    targetRevision: pipeline-validation
  syncPolicy:
    automated:
    prune: true
    selfHeal: true