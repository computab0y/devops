apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-pipelines-dev-int
  namespace: openshift-gitops
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: default
  source:
    path: services/tekton/pipelines
    repoURL: https://bitbucket.uk.ngridtools.com/scm/efe/env-dev-int.git
    targetRevision: pipeline-validation
  syncPolicy:
    automated:
    prune: true
    selfHeal: true