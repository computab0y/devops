apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: group-rolebindings
  namespace: openshift-gitops
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: default
  source:
    path: gitops/group-rolebindings
    repoURL: https://bitbucket.uk.ngridtools.com/scm/efe/devops-cluster-config.git
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true