          publicIP: false
          resourceGroup: eso-dev-uks-devops-rg     # from Azure
          subnet: lz5690-DEV-uks-worker-snet-01         # from Azure
          userDataSecret:
            name: worker-user-data
          vmSize: Standard_F16s_v2
          vnet: 5690-dev-uks-vnet-02
          zone: "1"