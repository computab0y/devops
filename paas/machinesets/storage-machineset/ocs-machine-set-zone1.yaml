          image:
            offer: ""
            publisher: ""
            resourceID: /resourceGroups/eso-dev-uks-devops-rg/providers/Microsoft.Compute/images/devops-nfk2l
            sku: ""
            version: ""
          internalLoadBalancer: ""          
