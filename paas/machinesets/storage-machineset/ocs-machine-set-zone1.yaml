    machine.openshift.io/cluster-api-cluster: devops-nfk2l
    machine.openshift.io/cluster-api-machine-role: storage
    machine.openshift.io/cluster-api-machine-type: storage
  name: storage-machineset-zone1
  namespace: openshift-machine-api
spec:
  replicas: 1 
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: devops-nfk2l
      machine.openshift.io/cluster-api-machineset: storage-machineset-zone1
  template:
    metadata:
      creationTimestamp: null
      labels:
