apiVersion: v1
kind: ServiceAccount
metadata:
  name: internal-app
  namespace: default
---
apiVersion: v1
data:
  ca.crt: 
kind: Secret
metadata:
  name: vault-server-tls
  namespace: default
type: Opaque
--- 
apiVersion: v1
kind: Pod
metadata:
  name: devwebapp-with-annotations
  namespace: default
  labels:
    app: devwebapp-with-annotations
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: 'devweb-app'
    vault.hashicorp.com/tls-skip-verify: "false"
    vault.hashicorp.com/tls-secret: vault-server-tls
    vault.hashicorp.com/ca-cert: /vault/tls/ca.crt
    vault.hashicorp.com/agent-inject-secret-credentials.txt: 'secret/data/devwebapp/config'
spec:
  serviceAccountName: internal-app
  containers:
    - name: app
      image: jfrog.uk.ngridtools.com/docker-proxy/bitnami/nginx 
      env:
        - name: VAULT_ADDR
          value: "https://vault.apps.management.balancing.nationalgrideso.com"
        - name: VAULT_TOKEN
          value: root
