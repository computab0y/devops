apiVersion: v1
baseDomain: balancing.nationalgrideso.com
controlPlane:
  hyperthreading: Enabled  
  name: master
  platform:
    azure:
      osDisk:
        diskSizeGB: 160
      type: Standard_D8s_v4
  replicas: 3
compute:
- hyperthreading: Enabled
  name: worker
  platform:
    azure:
      type: Standard_D8s_v4
      osDisk:
        diskSizeGB: 160
      zones:
      - "1"
      - "2"
      - "3"
  replicas: 3
metadata:
  name: devops
networking:
  clusterNetwork:
  - cidr: 10.128.0.0/14
    hostPrefix: 23
  machineNetwork:
  - cidr: 10.83.76.0/22
  - cidr: 10.83.74.0/23
  networkType: OpenShiftSDN
  serviceNetwork:
  - 172.30.0.0/16
platform:
  azure:
    baseDomainResourceGroupName: 5690-dev-uks-spokenetwork-rg
    region: uksouth
    resourceGroupName: eso-dev-uks-devops-rg
    networkResourceGroupName: 5690-dev-uks-spokenetwork-rg
    virtualNetwork: 5690-dev-uks-vnet-02 
    controlPlaneSubnet: lz5690-DEV-uks-master-snet-01
    computeSubnet: lz5690-DEV-uks-worker-snet-01
    outboundType: UserDefinedRouting
    cloudName: AzurePublicCloud
sshKey: ssh-rsa  openshift-service-management
fips: false
publish: Internal 