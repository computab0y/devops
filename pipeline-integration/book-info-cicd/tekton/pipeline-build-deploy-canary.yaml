apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: dso-pl-bookinfo
spec:
  workspaces:
    - name: build-deploy-workspace
  params:
    - name: GIT_URL
      type: string 
#      default: https://github.com/semirmussa1/ci-cd-istio-tekton
    - name: REPO_NAME
      type: string
      default: needs-repo-name     
    - name: BUILDER_IMAGE
      type: string
      default: https://quay.io/buildah/stable
    - name: REVISION
      type: string  
      default: master
    - name: SERVICE_NAME
      type: string  
      default: productpage
    - name: SERVICE_VERSION
      type: string
      default: latest
    - name: IMAGE_REPOSITORY
      type: string
      default: repo-name
  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params: 
        - name: GIT_URL
          value: "$(params.GIT_URL)"
        - name: REPO_NAME
          value: "$(params.REPO_NAME)"
        - name: REVISION
          value: "$(params.REVISION)"
      workspaces:
        - name: output
          workspace: build-deploy-workspace
    - name: build-service
      taskRef:
        name: build-service
      params:
        - name: SERVICE_NAME
          value: "$(params.SERVICE_NAME)"
        - name: IMAGE_REPOSITORY
          value: "$(params.IMAGE_REPOSITORY)"
        - name: SERVICE_VERSION
          value: "$(params.SERVICE_VERSION)"
        - name: REPO_NAME
          value: "$(params.REPO_NAME)"          
      workspaces:
        - name: output
          workspace: build-deploy-workspace
      runAfter:
        - git-clone
        
    - name: canary-rollout
      taskRef:
        name: canary-rollout
      params: 
        - name: SERVICE_NAME
          value: "$(params.SERVICE_NAME)"
        - name: IMAGE_REPOSITORY
          value: "$(params.IMAGE_REPOSITORY)"
        - name: SERVICE_VERSION
          value: "$(params.SERVICE_VERSION)"
        - name: REPO_NAME
          value: "$(params.REPO_NAME)"             
      workspaces:
        - name: output
          workspace: build-deploy-workspace
      runAfter:
        - build-service
      
        