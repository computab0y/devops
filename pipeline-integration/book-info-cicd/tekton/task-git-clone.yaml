apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
spec:
  params:
    - name: GIT_URL
      type: string 
#      default: https://github.com/semirmussa1/ci-cd-istio-tekton_pvt
    - name: REPO_NAME
      type: string 
    - name: REVISION
      type: string  
      default: master
  steps:
    - name: git-clone
      image: gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/git-init:v0.12.1
      securityContext:
        privileged: true
      script: |
        cd $(workspaces.output.path)
        rm -rf "$(params.REPO_NAME)"  
        git clone -b "$(params.REVISION)" "$(params.GIT_URL)"
        cd "$(params.REPO_NAME)"
        RESULT_SHA="$(git rev-parse HEAD | tr -d '\n')"
        pwd
        echo -n "$RESULT_SHA"
  workspaces:
    - name: output
      description: Location of output code