apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dso-bookinfo
  namespace: bookinfoargocd
spec:
  destination:
    namespace: dso-bookinfo
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      recurse: true
    path: deploy-scripts-quay
    repoURL: https://github.com/AccenturePreda/dso-project-bookinfofull.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true