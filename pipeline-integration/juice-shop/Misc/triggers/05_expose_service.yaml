kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: el-juice-shop-trigger
  namespace: dso-juice-shop
  labels:
    app.kubernetes.io/managed-by: EventListener
    app.kubernetes.io/part-of: Triggers
    eventlistener: juice-shop-trigger
  annotations:
    openshift.io/host.generated: 'true'
spec:
  host: >-
    <Trigger Host>
  to:
    kind: Service
    name: el-juice-shop-trigger
    weight: 100
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
status:
  ingress:
    - host: >-
        <Trigger Host>
      routerName: default
      wildcardPolicy: None
      routerCanonicalHostname: <Router host name>
