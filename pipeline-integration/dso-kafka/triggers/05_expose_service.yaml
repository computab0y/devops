kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: el-kafka-trigger
  namespace: dev-kafka-edaapp
  labels:
    app.kubernetes.io/managed-by: EventListener
    app.kubernetes.io/part-of: Triggers
    eventlistener: kafka-trigger
  annotations:
    openshift.io/host.generated: 'true'
spec:
  host: >-
    el-kafka-trigger-dev-kafka-edaapp.apps.ocp1.azure.dso.digital.mod.uk
  to:
    kind: Service
    name: el-kafka-trigger
    weight: 100
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
status:
  ingress:
    - host: >-
        el-kafka-trigger-dev-kafka-edaapp.apps.ocp1.azure.dso.digital.mod.uk
      routerName: default
      wildcardPolicy: None
      routerCanonicalHostname: router-default.apps.ocp1.azure.dso.digital.mod.uk