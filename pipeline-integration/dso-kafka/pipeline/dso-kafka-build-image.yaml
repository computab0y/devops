apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: dso-kafka-build-image
spec:
  workspaces:
  - name: source

  params:
  - name: IMAGE_REPOSITORY
    description: Repository where buildah will push new image
  - name: REPO_NAME
    description: Repository name
    default: dso-project-kafka  
  - name: BUILDER_IMAGE
    description: The location of the buildah builder image
    default: quay.io/buildah/stable
  - name: DOCKERFILE
    description: Path to the Dockerfile to build
    default: ./spring-boot-example/Dockerfile
  - name: SERVICE_NAME
    description: Path to the microservice directory to use as context
    default: details
  - name: SERVICE_VERSION
    description: Version of newly built service
    default: v2
  - name: CONTEXT 
    description: Path to Dockerfile
    default: ./spring-boot-example
  - name: TLSVERIFY
    description: Verify the TLS on the registry endpoint (for push/pull to a non-TLS registry)
    default: "false"
  - name: FORMAT
    description: The format of the built container, oci or docker
    default: "oci"

  results:
  - name: IMAGE_DIGEST
    description: Digest of the image just built.

  steps:
  - name: build
    image: $(params.BUILDER_IMAGE)
    # workingDir: $(workspaces.source.path)
    # command: ['buildah', 'bud', '--format=$(params.FORMAT)', '--tls-verify=$(params.TLSVERIFY)', '--no-cache', '-f', '$(params.DOCKERFILE)', '-t', '$(params.IMAGE)', '$(params.CONTEXT)']
    volumeMounts:
    - name: varlibcontainers
      mountPath: /var/lib/containers
    securityContext:
      privileged: true
    script: |
      cd $(workspaces.source.path)
      buildah bud --format=$(params.FORMAT) --tls-verify=$(params.TLSVERIFY) --no-cache -f $(params.DOCKERFILE) -t $(params.IMAGE_REPOSITORY)/$(params.SERVICE_NAME):$(params.SERVICE_VERSION) $(params.CONTEXT)
    #  buildah  bud --format=oci --tls-verify=true --no-cache -f ./spring-boot-example/Dockerfile -t dso-quay-registry-quay-quay-enterprise.apps.ocpcluster1.ocp.stackpoc.com/devops-team1/dso-kafka:v2 ./spring-boot-example
  - name: push
    image: $(params.BUILDER_IMAGE)
    env:
    - name: REGISTRY_AUTH_FILE
      value: /home/builder/.docker/config.json
    # workingDir: $(workspaces.source)
    # command: ['buildah', 'push', '--tls-verify=$(params.TLSVERIFY)', '$(params.IMAGE)']
    volumeMounts:
    - name: varlibcontainers
      mountPath: /var/lib/containers
    securityContext:
      privileged: true
    script: |
      cd $(workspaces.source.path)
      cat ~/.docker/config.json
      pwd
      buildah push --authfile ~/.docker/config.j/son --tls-verify=$(params.TLSVERIFY) $(params.IMAGE_REPOSITORY)/$(params.SERVICE_NAME):$(params.SERVICE_VERSION)
    #  buildah push --authfile ~/.docker/config.json --tls-verify=true dso-quay-registry-quay-quay-enterprise.apps.ocpcluster1.ocp.stackpoc.com/preda/dso-kafka:v2
  volumes:
  - name: varlibcontainers
    emptyDir: {}