---
- name: Manage OpenShift Cluster Lifecycle
  hosts: localhost
  vars_files:
    - vars.yml

  tasks:
    - name: Destroy CRC Cluster
      shell: "crc stop || true && crc delete -f"
      tags: [never, destroy]

    - name: Provision CRC Cluster
      shell: |
        crc config set memory {{ crc_memory }}
        crc config set cpus {{ crc_cpus }}
        crc start --pull-secret-file {{ pull_secret_path }}
      tags: [provision]

    - name: Bootstrap GitOps
      shell: |
        eval $(crc oc-env)
        KUBEADMIN_PASS=$(crc console --credentials | grep 'kubeadmin' | grep -o ' -p [^ ]*' | cut -d' ' -f3)
        oc login -u kubeadmin -p $KUBEADMIN_PASS https://api.crc.testing:6443 --insecure-skip-tls-verify
        
        oc create namespace openshift-gitops-operator --dry-run=client -o yaml | oc apply -f -
        cat <<EOM | oc apply -f -
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-gitops-operator
  namespace: openshift-gitops-operator
spec:
  upgradeStrategy: Default
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-gitops-operator
spec:
  channel: latest
  installPlanApproval: Automatic
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
EOM
      tags: [provision]

    - name: Wait for GitOps Operator
      shell: "eval $(crc oc-env) && oc get csv -n openshift-gitops-operator"
      register: csv_output
      until: "'Succeeded' in csv_output.stdout"
      retries: 30
      delay: 10
      tags: [provision]

    - name: Configure Argo CD and Deploy Applications
      shell: |
        eval $(crc oc-env)
        oc adm policy add-cluster-role-to-user cluster-admin -z openshift-gitops-argocd-application-controller -n openshift-gitops
        oc patch argocd openshift-gitops -n openshift-gitops --type='merge' -p '{"spec":{"resourceTrackingMethod":"annotation"}}'
        
        cat <<EOM | oc apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: repo-github-computab0y-devops
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: {{ github_repo_url }}
  password: {{ github_token }}
  username: {{ github_user }}
EOM

        for NS in keycloak grafana-operator openshift-pipelines-operator vault openshift-external-secrets-operator; do
          oc create namespace $NS --dry-run=client -o yaml | oc apply -f -
        done

        for APP in tekton sso grafana vault external-secrets; do
          DEST_NS=$APP
          [ "$APP" = "tekton" ] && DEST_NS="openshift-pipelines-operator"
          [ "$APP" = "sso" ] && DEST_NS="keycloak"
          [ "$APP" = "grafana" ] && DEST_NS="grafana-operator"
          [ "$APP" = "external-secrets" ] && DEST_NS="openshift-external-secrets-operator"

          cat <<EOM | oc apply -f -
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-$APP
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/instance: openshift-gitops
spec:
  project: default
  source:
    repoURL: {{ github_repo_url }}
    targetRevision: HEAD
    path: operators/subscription/$APP/base
  destination:
    server: https://kubernetes.default.svc
    namespace: $DEST_NS
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
EOM
        done
      tags: [provision]
